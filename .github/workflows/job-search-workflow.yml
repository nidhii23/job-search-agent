name: Job Search Agent - Daily Run

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run job search agent
        timeout-minutes: 10
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python job_search_agent_scheduled.py
      
      - name: Check results
        if: always()
        run: |
          echo "=== Files Created ==="
          ls -lah jobs_scheduled.csv run_log_scheduled.txt seen_jobs_scheduled.json 2>/dev/null || echo "Files not found"
          echo ""
          echo "=== Run Log (Last 20 lines) ==="
          tail -20 run_log_scheduled.txt 2>/dev/null || echo "No log"
          echo ""
          echo "=== Jobs Count ==="
          if [ -f jobs_scheduled.csv ]; then
            JOBS_COUNT=$(tail -n +2 jobs_scheduled.csv 2>/dev/null | wc -l)
            echo "✅ Total jobs: $JOBS_COUNT"
          else
            echo "❌ jobs_scheduled.csv not found"
          fi
      
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
      
      - name: Commit and push
        if: always()
        run: |
          echo "=== Git Status Before ==="
          git status
          
          echo ""
          echo "=== Adding files ==="
          git add jobs_scheduled.csv run_log_scheduled.txt seen_jobs_scheduled.json
          
          echo ""
          echo "=== Git Status After Add ==="
          git status
          
          echo ""
          echo "=== Committing ==="
          git diff --cached --stat
          git commit -m "Daily job scrape - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          
          echo ""
          echo "=== Pushing to main ==="
          git push origin main -v
          
          echo ""
          echo "✅ Push completed successfully"
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_id }}
          path: |
            jobs_scheduled.csv
            run_log_scheduled.txt
            seen_jobs_scheduled.json
          retention-days: 30
      
      - name: Create job summary
        if: always()
        run: |
          echo "## 📊 Job Search Agent Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f jobs_scheduled.csv ]; then
            JOBS_COUNT=$(tail -n +2 jobs_scheduled.csv 2>/dev/null | wc -l)
            echo "✅ **Jobs Found:** $JOBS_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "📥 **Download:** Check Artifacts section below" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **No CSV file created** (check logs)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Files to be committed:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`jobs_scheduled.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`run_log_scheduled.txt\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`seen_jobs_scheduled.json\`" >> $GITHUB_STEP_SUMMARY
